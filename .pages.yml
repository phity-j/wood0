media:
  - name: images
    label: 画像ファイル
    input: ""
    output: ""

content:
  - name: site
    label: サイト基本設定
    type: file
    path: _data/site.yml
    fields:
      - name: hero
        label: ヒーローセクション
        type: object
        fields:
          - name: title_en
            label: 英語タイトル
            type: string
          - name: title_ja
            label: 日本語タイトル（<br>で改行）
            type: text
      - name: profile
        label: プロフィール
        type: object
        fields:
          - name: bio
            label: 概要 (Bio)
            type: text
          - name: themes
            label: 主な発信テーマ
            type: object
            list: true
            fields:
              - name: title
                label: テーマ名
                type: string
              - name: description
                label: 詳細（省略可）
                type: string
          - name: career
            label: 内容
            type: string
          - name: substack_url
            label: SubstackリンクURL
            type: string

  - name: posts
    label: 記事 (Posts)
    type: collection
    path: _posts
    view:
      fields:
        - title
        - date
        - category
    fields:
      - name: title
        label: タイトル
        type: string
        required: true
      - name: date
        label: 日付
        type: date
        required: true
      - name: description
        label: 概要 (Description)
        type: string
      - name: thumbnail
        label: サムネイル画像
        type: image
      - name: category
        label: カテゴリー
        type: string
      - name: author
        label: 著者
        type: string
      - name: body
        label: 本文
        type: rich-text
