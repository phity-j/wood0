<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{ page.description | strip_html | truncate: 150 }}">
    <meta property="og:title" content="{{ page.title }} | ARCHI-FUTURE">
    <meta property="og:description" content="{{ page.description | strip_html | truncate: 150 }}">
    <meta property="og:image" content="{{ site.baseurl }}/{{ page.thumbnail }}">
    <title>{{ page.title }} | ARCHI-FUTURE</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Outfit:wght@200;300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ site.baseurl }}/style.css">
    <style>
        .post-content {
            font-family: var(--font-serif);
            line-height: 2;
            color: var(--text-main);
            font-size: 1.1rem;
        }
        .post-content h2 {
            font-family: var(--font-sans);
            color: var(--accent-blue);
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .post-content p {
            margin-bottom: 1.5rem;
        }
        .post-content a {
            color: var(--accent-blue);
            text-decoration: underline;
            text-underline-offset: 4px;
            transition: color 0.3s ease;
        }
        .post-content a:hover {
            color: var(--text-main);
        }
        .post-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 2rem 0;
        }
        .post-header {
            margin-bottom: 4rem;
            text-align: center;
        }
        .post-title {
            font-family: var(--font-sans);
            font-size: clamp(2rem, 4vw, 3rem);
            color: var(--text-main);
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        .post-meta {
            color: var(--text-muted);
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            align-items: center;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="logo"><a href="{{ site.baseurl }}/" style="color: inherit; text-decoration: none;">ARCHI-FUTURE</a></div>
        <nav class="nav">
            <ul>
                <li><a href="{{ site.baseurl }}/#latest">Articles</a></li>
                <li><a href="{{ site.baseurl }}/#profile">Profile</a></li>
                <li><a href="https://note.com/phity_2" target="_blank" rel="noopener noreferrer">note</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding-top: 120px;">
        <article class="section" style="max-width: 800px; padding-top: 4rem;">
            <header class="post-header fade-in visible">
                <div class="post-meta" style="margin-bottom: 1.5rem;">
                    <span class="category-chip">{{ page.category }}</span>
                    <span class="date">{{ page.date | date: "%Y.%m.%d" }}</span>
                </div>
                <h1 class="post-title">{{ page.title }}</h1>
            </header>
            
            {% if page.thumbnail and page.thumbnail != "" %}
            <div style="margin-bottom: 4rem; border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color);">
                <img src="{{ site.baseurl }}/{{ page.thumbnail }}" alt="{{ page.title }}" style="width: 100%; max-height: 400px; object-fit: cover;">
            </div>
            {% endif %}

            <div class="post-content fade-in visible">
                {{ content }}
            </div>
            
            <div style="margin-top: 6rem; text-align: center; border-top: 1px solid var(--border-color); padding-top: 3rem;">
                <a href="{{ site.baseurl }}/" style="color: var(--accent-blue); text-decoration: none; font-family: var(--font-sans); letter-spacing: 0.1em;">← Back to Home</a>
            </div>
        </article>
    </main>

    <footer class="footer">
        <p>&copy; 2026 ARCHI-FUTURE. All Rights Reserved.</p>
    </footer>

    <script src="{{ site.baseurl }}/script.js"></script>
</body>

</html>
