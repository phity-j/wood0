  title_en: ARCHI-FUTURE
  title_ja: 年を森に。
profile:
  bio: |-
    2027年：AI設計の一般化 ハイブリッド構造（S造×木造）の設計自動化AIが普及。地方工務店でも、コストと構造を瞬時に最適化した「非住宅木造」の提案が可能になります。
    2028年：ストックの木質化 スクラップ＆ビルドではなく、既存の鉄骨ビルの価値を「木」で高めるリノベーションが加速。都市の古い雑居ビルが、次々と高付加価値なオフィスへと生まれ変わります。
    2030年：空と木の融合 木造ドローンポート（バーティポート）が主要駅の屋上に常設。空のモビリティと、温もりのある木造インフラが日常の風景になります。
  career: 未来研究家。情報は追いません。変化の構造を追います。 AI、経済、働き方、教育。 次々と現れる現象の奥にある
    「時代を動かす力学」を読み解きます。 未来を予測するためではなく、 未来を理解するために。経歴：竹中技術研究所、プリンストン大学。
  substack_url: https://phitouc.substack.com/
